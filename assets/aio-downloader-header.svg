<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIO Downloader project header</title>
  <desc id="desc">Dark neon green dashboard illustration with a centered app screenshot and callouts for batch review, yt-dlp, torrents, Spotify, galleries, and progress tracking.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#b7ff00" stop-opacity=".26"/>
      <stop offset="48%" stop-color="#13c8ff" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#020b12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="210" y1="88" x2="1058" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132936"/>
      <stop offset="1" stop-color="#071822"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#c6ff00"/>
      <stop offset="1" stop-color="#91ff00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <filter id="limeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#24414f" stroke-opacity=".22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" rx="34" fill="#020b12"/>
  <rect width="1280" height="520" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="520" rx="34" fill="url(#glow)"/>
  <circle cx="160" cy="96" r="98" fill="#b7ff00" opacity=".08"/>
  <circle cx="1120" cy="430" r="130" fill="#13c8ff" opacity=".08"/>

  <g opacity=".78">
    <path d="M150 126 C237 68 306 59 390 99" stroke="#b7ff00" stroke-width="2" stroke-dasharray="6 10"/>
    <path d="M879 87 C981 45 1061 73 1148 151" stroke="#13c8ff" stroke-width="2" stroke-dasharray="6 10"/>
    <path d="M139 395 C230 456 311 459 406 416" stroke="#13c8ff" stroke-width="2" stroke-dasharray="6 10"/>
    <path d="M870 421 C985 471 1088 443 1168 346" stroke="#b7ff00" stroke-width="2" stroke-dasharray="6 10"/>
  </g>

  <g font-family="Comfortaa, Segoe UI, Arial, sans-serif">
    <text x="92" y="72" fill="#b7ff00" font-size="34" font-weight="700">AIO</text>
    <text x="162" y="72" fill="#f4fbff" font-size="34" font-weight="700">Downloader</text>
    <text x="92" y="107" fill="#9ab2c1" font-size="15">one clean dashboard for batch, media, torrents, galleries, and progress</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="260" y="112" width="760" height="332" rx="28" fill="url(#panel)" stroke="#315263"/>
    <rect x="260" y="112" width="760" height="54" rx="28" fill="#07131d"/>
    <rect x="260" y="140" width="760" height="26" fill="#07131d"/>
    <circle cx="296" cy="139" r="7" fill="#ff5570"/>
    <circle cx="320" cy="139" r="7" fill="#ffd166"/>
    <circle cx="344" cy="139" r="7" fill="#b7ff00"/>
    <text x="392" y="145" fill="#f7fbff" font-family="Comfortaa, Segoe UI, Arial" font-size="17" font-weight="700">Downloads</text>
    <text x="514" y="145" fill="#8ca5b6" font-family="Comfortaa, Segoe UI, Arial" font-size="15">Torrent Search</text>
    <text x="668" y="145" fill="#8ca5b6" font-family="Comfortaa, Segoe UI, Arial" font-size="15">Settings</text>
    <rect x="385" y="164" width="92" height="3" rx="1.5" fill="#b7ff00"/>

    <rect x="292" y="190" width="696" height="52" rx="14" fill="#081923" stroke="#304b5a"/>
    <circle cx="322" cy="216" r="10" stroke="#9ab2c1" stroke-width="2"/>
    <path d="M329 223 L338 232" stroke="#9ab2c1" stroke-width="3" stroke-linecap="round"/>
    <text x="352" y="222" fill="#8ca5b6" font-family="Comfortaa, Segoe UI, Arial" font-size="15">Paste a URL, playlist, magnet, torrent, manga, or gallery link…</text>
    <rect x="810" y="200" width="154" height="32" rx="10" fill="url(#lime)"/>
    <text x="843" y="221" fill="#07131d" font-family="Comfortaa, Segoe UI, Arial" font-size="13" font-weight="700">Start review</text>

    <g>
      <rect x="292" y="264" width="130" height="48" rx="12" fill="#122734" stroke="#b7ff00"/>
      <text x="326" y="294" fill="#b7ff00" font-family="Comfortaa, Segoe UI, Arial" font-size="14" font-weight="700">Auto</text>
      <rect x="436" y="264" width="130" height="48" rx="12" fill="#0b1d28" stroke="#304b5a"/>
      <text x="476" y="294" fill="#b8c8d3" font-family="Comfortaa, Segoe UI, Arial" font-size="14">Video</text>
      <rect x="580" y="264" width="130" height="48" rx="12" fill="#0b1d28" stroke="#304b5a"/>
      <text x="621" y="294" fill="#b8c8d3" font-family="Comfortaa, Segoe UI, Arial" font-size="14">Audio</text>
      <rect x="724" y="264" width="130" height="48" rx="12" fill="#0b1d28" stroke="#304b5a"/>
      <text x="758" y="294" fill="#b8c8d3" font-family="Comfortaa, Segoe UI, Arial" font-size="14">Torrent</text>
      <rect x="868" y="264" width="120" height="48" rx="12" fill="#0b1d28" stroke="#304b5a"/>
      <text x="899" y="294" fill="#b8c8d3" font-family="Comfortaa, Segoe UI, Arial" font-size="14">Gallery</text>
    </g>

    <rect x="292" y="336" width="696" height="78" rx="16" fill="#081923" stroke="#263f4d"/>
    <text x="318" y="363" fill="#f7fbff" font-family="Comfortaa, Segoe UI, Arial" font-size="15" font-weight="700">Hanime playlist · Uncensored</text>
    <text x="318" y="388" fill="#91ff00" font-family="Comfortaa, Segoe UI, Arial" font-size="13">24 items · 20 selected · thumbnails ready · sequential batch queue</text>
    <rect x="760" y="356" width="188" height="18" rx="9" fill="#0f2c35"/>
    <rect x="760" y="356" width="126" height="18" rx="9" fill="#b7ff00"/>
    <text x="760" y="397" fill="#8ca5b6" font-family="Comfortaa, Segoe UI, Arial" font-size="12">speed · ETA · retry failed · resume remaining</text>
  </g>

  <g font-family="Comfortaa, Segoe UI, Arial, sans-serif">
    <g filter="url(#softShadow)">
      <rect x="74" y="166" width="194" height="82" rx="20" fill="#0b1d28" stroke="#2a4a5a"/>
      <circle cx="112" cy="207" r="18" fill="#b7ff00" opacity=".16"/>
      <path d="M103 207 h18 M113 198 v18" stroke="#b7ff00" stroke-width="3" stroke-linecap="round"/>
      <text x="142" y="200" fill="#f7fbff" font-size="14" font-weight="700">Batch Review</text>
      <text x="142" y="222" fill="#8ca5b6" font-size="12">select exactly what runs</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="64" y="282" width="206" height="82" rx="20" fill="#0b1d28" stroke="#2a4a5a"/>
      <circle cx="103" cy="323" r="18" fill="#13c8ff" opacity=".16"/>
      <path d="M94 329 l9-13 9 13" stroke="#13c8ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="135" y="316" fill="#f7fbff" font-size="14" font-weight="700">yt-dlp Auto</text>
      <text x="135" y="338" fill="#8ca5b6" font-size="12">site support grows with it</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="1010" y="168" width="200" height="82" rx="20" fill="#0b1d28" stroke="#2a4a5a"/>
      <circle cx="1049" cy="209" r="18" fill="#b7ff00" opacity=".16"/>
      <path d="M1040 210 h18 M1049 201 v18" stroke="#b7ff00" stroke-width="3" stroke-linecap="round"/>
      <text x="1080" y="202" fill="#f7fbff" font-size="14" font-weight="700">Torrents</text>
      <text x="1080" y="224" fill="#8ca5b6" font-size="12">search, inspect, select files</text>
    </g>
    <g filter="url(#softShadow)">
      <rect x="1014" y="286" width="196" height="82" rx="20" fill="#0b1d28" stroke="#2a4a5a"/>
      <circle cx="1052" cy="327" r="18" fill="#13c8ff" opacity=".16"/>
      <path d="M1044 323 c5-7 13-7 18 0 M1041 331 c8-10 20-10 28 0" stroke="#13c8ff" stroke-width="2.6" stroke-linecap="round"/>
      <text x="1082" y="320" fill="#f7fbff" font-size="14" font-weight="700">Spotify + Galleries</text>
      <text x="1082" y="342" fill="#8ca5b6" font-size="12">audio, manga, PDFs</text>
    </g>
  </g>

  <g filter="url(#limeGlow)">
    <circle cx="641" cy="476" r="4" fill="#b7ff00"/>
    <circle cx="665" cy="476" r="4" fill="#13c8ff"/>
    <circle cx="617" cy="476" r="4" fill="#13c8ff"/>
  </g>
</svg>
